<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blåtur – Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Söhne", ui-sans-serif, system-ui, sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e2dc;
      padding: 18px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 15px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.01em; }
    .logo span { color: #d4763b; }

    main {
      flex: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 24px 96px;
      width: 100%;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 600;
      color: #d4763b;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 40px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 10px;
    }

    .meta {
      font-size: 13px;
      color: #999;
      margin-bottom: 56px;
      padding-bottom: 32px;
      border-bottom: 1px solid #e5e2dc;
    }

    .links { display: flex; flex-direction: column; gap: 14px; }

    a.btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border: 1px solid #e5e2dc;
      border-radius: 10px;
      padding: 18px 22px;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    a.btn:hover { border-color: #d4763b; background: #fff8f4; }

    .btn-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .btn-sub {
      font-size: 13px;
      color: #999;
      margin-top: 2px;
    }
    .btn-arrow { font-size: 18px; color: #d4763b; }

    footer {
      background: #fff;
      border-top: 1px solid #e5e2dc;
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    footer p { font-size: 13px; color: #999; }
    footer a { font-size: 13px; color: #999; text-decoration: none; margin-left: 20px; }
    footer a:hover { color: #d4763b; }

    @media (max-width: 640px) {
      header { padding: 16px 20px; }
      h1 { font-size: 28px; }
      main { padding: 48px 20px 72px; }
      footer { padding: 20px; flex-direction: column; align-items: flex-start; }
      footer a { margin-left: 0; margin-top: 4px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">SSW AS <span>· Blåtur</span></div>
  </header>

  <main>
    <div class="eyebrow">Legal</div>
    <h1>Legal Documents</h1>
    <p class="meta">Blåtur iOS Application &nbsp;·&nbsp; SSW AS, Norway</p>

    <div class="links">
      <a href="privacy.html" class="btn">
        <div>
          <div class="btn-title">Privacy Policy</div>
          <div class="btn-sub">How we handle your data</div>
        </div>
        <span class="btn-arrow">→</span>
      </a>
      <a href="terms.html" class="btn">
        <div>
          <div class="btn-title">Terms of Service</div>
          <div class="btn-sub">Rules for using the app</div>
        </div>
        <span class="btn-arrow">→</span>
      </a>
    </div>
  </main>

  <footer>
    <p>© 2026 SSW AS · Blåtur iOS Application</p>
    <div>
      <a href="mailto:post@sswinvest.no">post@sswinvest.no</a>
    </div>
  </footer>

</body>
</html>
